# Clave única y nombre del proyecto en SonarQube
sonar.projectKey=MP_202610_G81_E2_Front
sonar.projectName=MP_202610_G81_E2_Front
sonar.projectVersion=1.0

# Ruta de los archivos fuente 
sonar.sources=src

# Archivos o carpetas a excluir del análisis para evitar escanear librerías o compilados
sonar.exclusions=**/node_modules/**, **/dist/**, **/*.spec.js, **/*.test.js, **/*.test.tsx, **/*.config.js, coverage/**

# Archivo de cobertura de reporte generado por vitest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Codificación estándar
sonar.sourceEncoding=UTF-8